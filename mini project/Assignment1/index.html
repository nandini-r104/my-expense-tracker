<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Search Filter</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #13141a;
      --card: #1a1c24;
      --border: #2a2d3a;
      --accent: #00e5a0;
      --accent2: #005eff;
      --text: #e8eaf0;
      --muted: #6b7280;
      --danger: #ff4d6d;
      --radius: 14px;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }
 
    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
 
    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
 
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 660px;
    }
 
    /* Header */
    header {
      margin-bottom: 48px;
      text-align: center;
    }
 
    .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.3);
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
      animation: fadeDown 0.6s ease both;
    }
 
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1.5px;
      color: var(--text);
      animation: fadeDown 0.7s ease 0.1s both;
    }
 
    h1 span {
      color: var(--accent);
    }
 
    .subtitle {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
      animation: fadeDown 0.7s ease 0.2s both;
    }
 
    /* Search bar */
    .search-box {
      position: relative;
      margin-bottom: 20px;
      animation: fadeDown 0.7s ease 0.3s both;
    }
 
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }
 
    #searchInput {
      width: 100%;
      padding: 18px 50px 18px 52px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
 
    #searchInput::placeholder { color: var(--muted); }
 
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0,229,160,0.08), 0 0 20px rgba(0,229,160,0.05);
    }
 
    #searchInput:focus ~ .search-icon { color: var(--accent); }
 
    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border);
      border: none;
      color: var(--muted);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
 
    .clear-btn:hover { background: var(--danger); color: #fff; }
    .clear-btn.visible { display: flex; }
 
    /* Stats bar */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
      font-size: 12px;
      color: var(--muted);
      animation: fadeDown 0.7s ease 0.4s both;
    }
 
    .count-badge {
      background: rgba(0,229,160,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.2);
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s;
    }
 
    /* List */
    #itemList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeDown 0.7s ease 0.45s both;
    }
 
    #itemList li {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s, opacity 0.25s, box-shadow 0.2s;
      cursor: default;
      animation: slideIn 0.35s ease both;
    }
 
    #itemList li:hover {
      border-color: rgba(0,229,160,0.4);
      transform: translateX(4px);
      box-shadow: -3px 0 0 var(--accent);
    }
 
    #itemList li.hidden {
      display: none;
    }
 
    .item-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
 
    .item-text {
      flex: 1;
    }
 
    .item-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
 
    .item-name mark {
      background: rgba(0,229,160,0.25);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 2px;
    }
 
    .item-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
 
    .item-tag {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
    }
 
    /* No results */
    #noResults {
      display: none;
      text-align: center;
      padding: 60px 20px;
      animation: fadeIn 0.3s ease;
    }
 
    #noResults .no-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
 
    #noResults h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
 
    #noResults p {
      font-size: 13px;
      color: var(--muted);
    }
 
    #noResults span {
      color: var(--accent);
    }
 
    /* Footer */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeDown 0.7s ease 0.5s both;
    }
 
    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
 
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="tag">Assessment 01 · Web Dev</div>
      <h1>Live <span>Search</span><br>Filter</h1>
      <p class="subtitle">Type to filter items in real-time · DOM Manipulation · No page refresh</p>
    </header>
 
    <!-- Search Input -->
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off" />
      <button class="clear-btn" id="clearBtn" title="Clear search">✕</button>
    </div>
 
    <!-- Stats Bar -->
    <div class="stats-bar">
      <span>Showing <span id="visibleCount" class="count-badge">16</span> of 16 items</span>
      <span id="searchTerm"></span>
    </div>
 
    <!-- Item List -->
    <ul id="itemList">
      <!-- Items injected by JS -->
    </ul>
 
    <!-- No Results Message -->
    <div id="noResults">
      <div class="no-icon">🔍</div>
      <h3>No results found</h3>
      <p>Nothing matched <span id="noResultsTerm"></span>. Try a different keyword.</p>
    </div>
 
    <footer>HTML · CSS · JavaScript (DOM) — Live Search Filter Project</footer>
  </div>
 
  <script>
    // ── Data ──────────────────────────────────────────────────────────────────
    const items = [
      { name: "Wireless Noise-Cancelling Headphones", meta: "Audio · Electronics", emoji: "🎧", color: "#7c3aed", tagColor: "#7c3aed22", tagBorder: "#7c3aed55", tag: "Audio" },
      { name: "Mechanical Keyboard (RGB)", meta: "Peripherals · Electronics", emoji: "⌨️", color: "#2563eb", tagColor: "#2563eb22", tagBorder: "#2563eb55", tag: "Peripheral" },
      { name: "4K Ultra HD Monitor", meta: "Displays · Electronics", emoji: "🖥️", color: "#0891b2", tagColor: "#0891b222", tagBorder: "#0891b255", tag: "Display" },
      { name: "Portable SSD 1TB", meta: "Storage · Electronics", emoji: "💾", color: "#059669", tagColor: "#05966922", tagBorder: "#05966955", tag: "Storage" },
      { name: "USB-C Charging Hub", meta: "Accessories · Electronics", emoji: "🔌", color: "#d97706", tagColor: "#d9770622", tagBorder: "#d9770655", tag: "Accessory" },
      { name: "Smartphone Stand (Adjustable)", meta: "Accessories · Mobile", emoji: "📱", color: "#db2777", tagColor: "#db277722", tagBorder: "#db277755", tag: "Mobile" },
      { name: "Webcam 1080p HD", meta: "Video · Electronics", emoji: "📷", color: "#7c3aed", tagColor: "#7c3aed22", tagBorder: "#7c3aed55", tag: "Video" },
      { name: "Ergonomic Mouse (Wireless)", meta: "Peripherals · Electronics", emoji: "🖱️", color: "#2563eb", tagColor: "#2563eb22", tagBorder: "#2563eb55", tag: "Peripheral" },
      { name: "Laptop Cooling Pad", meta: "Cooling · Accessories", emoji: "❄️", color: "#0891b2", tagColor: "#0891b222", tagBorder: "#0891b255", tag: "Cooling" },
      { name: "Smart LED Desk Lamp", meta: "Lighting · Smart Home", emoji: "💡", color: "#ca8a04", tagColor: "#ca8a0422", tagBorder: "#ca8a0455", tag: "Lighting" },
      { name: "Noise-Cancelling Microphone", meta: "Audio · Recording", emoji: "🎙️", color: "#dc2626", tagColor: "#dc262622", tagBorder: "#dc262655", tag: "Audio" },
      { name: "Streaming Capture Card", meta: "Video · Streaming", emoji: "🎮", color: "#7c3aed", tagColor: "#7c3aed22", tagBorder: "#7c3aed55", tag: "Gaming" },
      { name: "HDMI 2.1 Cable (2m)", meta: "Cables · Accessories", emoji: "🔗", color: "#059669", tagColor: "#05966922", tagBorder: "#05966955", tag: "Cable" },
      { name: "Wireless Charging Pad", meta: "Charging · Accessories", emoji: "⚡", color: "#d97706", tagColor: "#d9770622", tagBorder: "#d9770655", tag: "Charging" },
      { name: "Smart Plug (Wi-Fi)", meta: "Smart Home · Automation", emoji: "🏠", color: "#0891b2", tagColor: "#0891b222", tagBorder: "#0891b255", tag: "Smart Home" },
      { name: "Portable Bluetooth Speaker", meta: "Audio · Portable", emoji: "🔊", color: "#db2777", tagColor: "#db277722", tagBorder: "#db277755", tag: "Audio" },
    ];
 
    const TOTAL = items.length;
 
    // ── DOM References ────────────────────────────────────────────────────────
    const searchInput   = document.getElementById('searchInput');
    const clearBtn      = document.getElementById('clearBtn');
    const itemList      = document.getElementById('itemList');
    const noResults     = document.getElementById('noResults');
    const visibleCount  = document.getElementById('visibleCount');
    const searchTerm    = document.getElementById('searchTerm');
    const noResultsTerm = document.getElementById('noResultsTerm');
 
    // ── Render Items ──────────────────────────────────────────────────────────
    function renderItems() {
      itemList.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.dataset.name = item.name.toLowerCase();
        li.style.animationDelay = `${i * 0.04}s`;
        li.innerHTML = `
          <div class="item-icon" style="background:${item.tagColor};border:1px solid ${item.tagBorder}">
            ${item.emoji}
          </div>
          <div class="item-text">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">${item.meta}</div>
          </div>
          <span class="item-tag" style="color:${item.color};background:${item.tagColor};border-color:${item.tagBorder}">
            ${item.tag}
          </span>
        `;
        itemList.appendChild(li);
      });
    }
 
    // ── Highlight matching text ───────────────────────────────────────────────
    function highlight(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escaped})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }
 
    // ── Filter Logic ──────────────────────────────────────────────────────────
    function filterList() {
      const query = searchInput.value.trim().toLowerCase();
      const listItems = itemList.querySelectorAll('li');
      let count = 0;
 
      listItems.forEach((li, i) => {
        const name = items[i].name;
        const matches = name.toLowerCase().includes(query);
 
        if (matches) {
          li.classList.remove('hidden');
          // Update highlighted name
          li.querySelector('.item-name').innerHTML = highlight(name, query);
          count++;
        } else {
          li.classList.add('hidden');
        }
      });
 
      // Update count badge
      visibleCount.textContent = count;
 
      // Show/hide no results
      if (count === 0) {
        noResults.style.display = 'block';
        itemList.style.display = 'none';
        noResultsTerm.textContent = `"${searchInput.value.trim()}"`;
      } else {
        noResults.style.display = 'none';
        itemList.style.display = 'flex';
      }
 
      // Show search term label
      if (query) {
        searchTerm.textContent = `Searching: "${searchInput.value.trim()}"`;
        clearBtn.classList.add('visible');
      } else {
        searchTerm.textContent = '';
        clearBtn.classList.remove('visible');
      }
    }
 
    // ── Event Listeners ───────────────────────────────────────────────────────
    searchInput.addEventListener('input', filterList);
 
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      filterList();
    });
 
    // ── Init ──────────────────────────────────────────────────────────────────
    renderItems();
    visibleCount.textContent = TOTAL;
  </script>
</body>
</html>
